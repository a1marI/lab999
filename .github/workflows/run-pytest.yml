name: "Run Pytest"
on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:    
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123
          POSTGRES_DB: lab1_db  # Изменено с user на lab1_db для соответствия .env
          PGDATA: /var/lib/postgresql/data/pgdata
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'  # Кэширование зависимостей для ускорения

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else
            echo "requirements.txt not found, installing basic dependencies"
            pip install fastapi uvicorn sqlalchemy asyncpg pydantic pydantic-settings
            pip install pytest pytest-asyncio httpx
          fi
          pip install setuptools
          pip install psycopg2-binary  # Для создания БД если нужно
          pip install -e .

      - name: Run database migrations
        run: |
          alembic upgrade head
        env:
          DB__URL: postgresql+asyncpg://postgres:123@localhost:5432/lab1_db
          DB__ECHO: False
          DB__POOL_SIZE: 10
          DB__MAX_OVERFLOW: 5
          JWT__SECRET: test-secret-key-for-ci
          JWT__ALGORITHM: HS256
          JWT__ACCESS_TOKEN_EXPIRE_MINUTES: 30
          RUN__HOST: 0.0.0.0
          RUN__PORT: 8001
          RUN__RELOAD: False

      - name: Run tests with pytest
        run: |
          # Проверяем наличие тестов
          if [ -d "tests" ]; then
            # Если есть конкретный файл тестов
            if [ -f "tests/test_user.py" ]; then
              python -m pytest tests/test_user.py -v --tb=short
            else
              # Или все тесты
              python -m pytest tests/ -v --tb=short
            fi
          else
            echo "No tests directory found, skipping tests"
            exit 0
          fi
        env:
          DB__URL: postgresql+asyncpg://postgres:123@localhost:5432/lab1_db
          DB__ECHO: False
          DB__POOL_SIZE: 10
          DB__MAX_OVERFLOW: 5
          JWT__SECRET: test-secret-key-for-ci
          JWT__ALGORITHM: HS256
          JWT__ACCESS_TOKEN_EXPIRE_MINUTES: 30
          RUN__HOST: 0.0.0.0
          RUN__PORT: 8001
          RUN__RELOAD: False

      - name: Upload test results
        if: always()  # Всегда загружаем результаты, даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: |
            pytest-results.xml
            test-reports/
          retention-days: 30

      - name: Run linting (optional)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
